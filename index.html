<!DOCTYPE html>
<html xml:lang="es">
  <head>
    <title>Totalizador</title>
  </head>

  <body>
    <h1>Totalizador de Venta</h1>

    <form id="totalizador-form">

      <label for="cantidad">Cantidad de ítems:</label>
      <input type="number" id="cantidad" />

      <br /><br />

      <label for="precio">Precio por ítem:</label>
      <input type="number" id="precio" />

      <br /><br />

      <label for="estado">Estado:</label>
      <select name="estado" id="estado">
        <option value="CA">California</option>
        <option value="NV">Nevada</option>
        <option value="TX">Texas</option>
        <option value="FL">Florida</option>
      </select>

      <br /><br />

      <label for="categoria">Categoria de producto:</label>
      <select name="categoria" id="categoria">
        <option value="Alimentos">Alimentos</option>
        <option value="BebidasAlcoholicas">Bebidas Alcoholicas</option>
        <option value="MaterialDeEscritorio">Material de Escritorio</option>
        <option value="Muebles">Muebles</option>
        <option value="Electronicos">Electronicos</option>
        <option value="Vestimenta">Vestimenta</option>
        <option value="Varios">Varios</option>
      </select>

      <br /><br />

      <label for="tipoCliente">Tipo de cliente:</label>
      <select id="tipoCliente">
        <option value="Normal">Normal</option>
        <option value="Recurrente">Recurrente</option>
        <option value="Antiguo Recurrente">Antiguo Recurrente</option>
        <option value="Especial">Especial</option>
      </select>

      <br /><br />

      <label for="peso">Peso volumétrico por unidad (g):</label>
      <input type="number" id="peso" />

      <br /><br />

      <input type="submit" value="Totalizar" id="totalizar-button" />

    </form>

    <br />

    <div id="resultado-div"></div>
    <div id="impuesto-div"></div>
    <div id="descuento-div"></div>
    <div id="envio-div"></div>
    <div id="total-div"></div>

    <script type="module" src="./src/presenter.js"></script>

  </body>
</html>
